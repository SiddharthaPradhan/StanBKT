[project]
name = "stanbkt"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
authors = [
    { name = "Sid Pradhan", email = "64797131+SiddharthaPradhan@users.noreply.github.com" }
]
requires-python = ">=3.13"
dependencies = [
    "arviz>=0.22.0",
    "cmdstanpy>=1.3.0",
    "numba>=0.64.0",
    "numpy>=2.3.4",
    "pandas>=2.3.3",
    "scikit-learn>=1.8.0",
    "sphinx>=8.2.3",
    "xarray>=2025.10.1",
]

[build-system]
requires = ["uv_build>=0.8.11,<0.9.0"]
build-backend = "uv_build"

[dependency-groups]
dev = [
    "ipykernel>=7.2.0",
    "sphinx-autodoc-typehints>=3.8.0",
    "sphinxcontrib-napoleon>=0.7",
]
